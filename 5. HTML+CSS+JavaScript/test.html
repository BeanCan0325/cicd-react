<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>CSS 2Depth 메뉴 실습</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 기본 초기화 */
        * {
            margin: 0;
            padding: 0;
        }

        body {
            height: 1500px;
            background-color: #f4f7f6;
        }

        ul {
            list-style: none;
        }

        a {
            text-decoration: none;
            color: #333;
            display: block;
        }

        /* 네비게이션 바 디자인 */
        .navbar {
            background-color: #2c3e50;
            height: 60px;
            display: flex;
            justify-content: center;
        }

        /* 1Depth 메뉴 스타일 */
        .main-menu {
            display: flex;
            /* 가로 정렬 */
        }

        .main-menu>li {
            position: relative;
            /* 2Depth의 기준점 설정 */
        }

        .main-menu>li>a {
            padding: 0 30px;
            line-height: 60px;
            color: white;
            font-weight: bold;
        }

        .main-menu>li:hover>a {
            background-color: #34495e;
        }

        /* 2Depth (서브 메뉴) 숨기기 */
        .sub-menu {
            display: none;
            /* 평소에는 안 보이게 */
            position: absolute;
            /* 1Depth 메뉴 바로 아래 고정 */
            top: 60px;
            left: 0;
            background-color: white;
        }

        .sub-menu li a {
            padding: 12px 20px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .sub-menu li a:hover {
            background-color: #f1f1f1;
            color: #e74c3c;
        }

        /* 핵심: 마우스 올리면 나타나게 하기 */
        .main-menu>li:hover .sub-menu {
            display: block;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <ul class="main-menu">
            <li>
                <a href="#">메뉴 1</a>
                <ul class="sub-menu">
                    <li><a href="#">서브메뉴 1-1</a></li>
                    <li><a href="#">서브메뉴 1-2</a></li>
                    <li><a href="#">서브메뉴 1-3</a></li>
                </ul>
            </li>

            <li>
                <a href="#">메뉴 2</a>
                <ul class="sub-menu">
                    <li><a href="#">서브메뉴 2-1</a></li>
                    <li><a href="#">서브메뉴 2-2</a></li>
                </ul>
            </li>

            <li><a href="#">메뉴 3</a></li>
        </ul>
    </nav>

    <main>
        <h1>2Depth 메뉴 구현하기</h1>
    </main>

</body>

</html>
