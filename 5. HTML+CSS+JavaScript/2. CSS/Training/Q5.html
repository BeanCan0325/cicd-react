<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial;
        }

        .parent {
            position: relative;
            width: 400px;
            height: 200px;
            background: #ddd;
            margin: 50px;
        }

        .box1 {
            width: 150px;
            height: 150px;
            background: skyblue;
        }

        .box2 {
            position: absolute;
            top: 50px;
            left: 100px;
            width: 150px;
            height: 150px;
            background: tomato;
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box1"></div>
        <div class="box2"></div>
    </div>
</body>

</html>
