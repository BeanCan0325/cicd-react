<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        .hero {
            height: 100vh;
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .hero button {
            padding: 12px 30px;
            border: none;
            background: white;
            color: #3b82f6;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .hero button:hover {
            background: #ddd;
        }
    </style>
</head>

<body>
    <!-- 
        렌딩 페이지
            - 특정 목적을 위해 사용자가 들어오도록 유도하는 페이지
        
        히어로
            - 페이지에서 가장 강조되는 영역
        
        히어로 구조
            - 제목
            - 한줄 설명
            - CTA 버튼
            - (선택) 이미지 등
        
        CTA 버튼
            - "무료로 시작하기", "지금 시작하기", "상담 신청하기" 등 특정 행동을 하라고
                유도하는 버튼
    -->
    <div class="hero">
        <h1>Build Your Future</h1>
        <p>Start learning today and grow your career.</p>
        <button>Get Started</button>
    </div>
</body>

</html>
