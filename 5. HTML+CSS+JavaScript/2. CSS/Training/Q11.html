<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: #87CEEB;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle-container {
            display: flex;
        }

        .circle {
            width: 20px;
            height: 20px;
            margin: 10px;
            background-color: #4682B4;
            border-radius: 50%;
            animation: circleAnimation 3s linear infinite
        }

        @keyframes circleAnimation {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(2);
                opacity: 0;
                margin: 0;
            }
        }
    </style>
</head>
<body>
    <div class="circle-container">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>
</body>
</html>
