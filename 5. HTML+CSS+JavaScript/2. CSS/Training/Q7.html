<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Services</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 50px;
    background: #111;
    color: white;
}

nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    position: relative;
}

.services {
    padding: 50px;
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}

.card {
    flex: 1 1 calc(33.333% - 20px);
    background: #f4f4f4;
    padding: 40px;
    text-align: center;
    border-radius: 10px;
    transition: 0.3s;
}

</style>
</head>
<body>

<header>
    <div>MyCompany</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="services">
    <div class="card">Service 1</div>
    <div class="card">Service 2</div>
    <div class="card">Service 3</div>
    <div class="card">Service 4</div>
    <div class="card">Service 5</div>
    <div class="card">Service 6</div>
</section>

</body>
</html>
